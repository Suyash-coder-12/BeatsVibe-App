<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeatsVibe | App</title>
    <link rel="icon" type="image/png" href="logo1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-['Plus_Jakarta_Sans'] dark:bg-slate-950 dark:text-white pb-24 relative selection:bg-blue-500/30">

    <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 w-full px-6 max-w-sm"></div>

    <header class="glass-panel sticky top-0 z-40 px-6 py-4 flex justify-between items-center border-b-0 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-200 dark:border-slate-700">
                <img id="headerAvatar" src="" class="w-full h-full object-cover hidden">
                <i id="headerIcon" class="fas fa-user text-blue-500"></i>
            </div>
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Welcome back</p>
                <h2 id="dashName" class="font-extrabold text-sm dark:text-white">Student</h2>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-yellow-400 transition"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="px-6 pt-6">
        
        <div id="tab-home" class="app-section block animate-fade-in-up">
            <h3 class="font-black text-2xl mb-4">Your Journey</h3>
            <div id="myCoursesList" class="space-y-4"></div>
        </div>

        <div id="tab-explore" class="app-section hidden animate-fade-in-up">
            <h3 class="font-black text-2xl mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-cyan-400">Academy Hub</h3>
            <div id="appCourseGrid" class="space-y-4 mb-10"></div> <h3 class="font-black text-xl mb-4">Meet Our Experts</h3>
            <div id="facultiesList" class="flex overflow-x-auto gap-4 pb-4 snap-x"></div>
        </div>

        <div id="tab-study" class="app-section hidden animate-fade-in-up">
            <h3 class="font-black text-2xl mb-4">Study Material</h3>
            <div id="myNotesList" class="space-y-3 mb-8"></div>
            
            <h3 class="font-black text-2xl mb-4">Achievements</h3>
            <div id="myCertsList" class="space-y-4"></div>
        </div>

        <div id="tab-profile" class="app-section hidden animate-fade-in-up">
            <div class="text-center mb-8 relative">
                <div class="w-24 h-24 mx-auto rounded-3xl bg-slate-200 dark:bg-slate-800 flex items-center justify-center overflow-hidden border-4 border-white dark:border-slate-900 shadow-xl relative group cursor-pointer" onclick="document.getElementById('profilePicInput').click()">
                    <img id="profileAvatar" src="" class="w-full h-full object-cover hidden">
                    <i id="profileIcon" class="fas fa-camera text-slate-400 text-2xl"></i>
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition"><i class="fas fa-pen text-white"></i></div>
                </div>
                <input type="file" id="profilePicInput" accept="image/*" class="hidden" onchange="handleProfileUpload(event)">
                <h3 id="profileName" class="font-black text-xl mt-3">Student</h3>
                <p id="profileId" class="text-xs text-slate-400 font-mono">ID</p>
            </div>

            <form onsubmit="saveProfileSettings(event)" class="space-y-4 text-sm bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Full Name</label><input type="text" id="set-name" class="w-full mt-1 p-3.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl outline-none" required></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Phone</label><input type="text" id="set-phone" placeholder="+91" class="w-full mt-1 p-3.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Education</label><select id="set-edu" class="w-full mt-1 p-3.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl outline-none"><option value="School">School</option><option value="College">College</option><option value="Graduate">Graduate</option><option value="Professional">Professional</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">College/Company</label><input type="text" id="set-college" class="w-full mt-1 p-3.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl outline-none"></div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-2 shadow-lg shadow-blue-500/30">Save Profile</button>
            </form>
            
            <button onclick="logout()" class="w-full bg-red-50 dark:bg-red-900/20 text-red-500 font-bold py-4 rounded-2xl mt-6 border border-red-100 dark:border-red-800/50"><i class="fas fa-sign-out-alt mr-2"></i> Terminate Session</button>
        </div>
    </main>

    <button onclick="toggleNeuroNova()" class="fixed bottom-24 right-6 w-14 h-14 bg-cyan-500 rounded-full flex items-center justify-center text-slate-900 text-2xl shadow-[0_0_20px_rgba(6,182,212,0.6)] z-40 transition-transform hover:scale-110"><i class="fas fa-brain"></i></button>

    <div id="neuroNovaWidget" class="fixed inset-x-4 bottom-24 bg-slate-900/95 backdrop-blur-3xl border border-cyan-500/30 rounded-[32px] shadow-2xl z-50 transform translate-y-[150%] transition-transform duration-500 flex flex-col h-[60vh]">
        <div class="p-4 border-b border-cyan-500/20 flex justify-between items-center">
            <div class="flex items-center gap-3"><div class="w-8 h-8 bg-cyan-500 rounded-full flex items-center justify-center text-slate-900 text-sm"><i class="fas fa-brain"></i></div><div><h3 class="font-extrabold text-cyan-400 text-sm">NeuroNova</h3><p class="text-[10px] text-cyan-500/70">AI Mentor</p></div></div>
            <button onclick="toggleNeuroNova()" class="text-cyan-500 p-2"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4 font-mono text-xs" id="nn-console">
            <div class="flex flex-col gap-1"><span class="text-slate-500 text-[10px]">System</span><p class="text-cyan-300 bg-cyan-500/10 p-3 rounded-tr-2xl rounded-bl-2xl rounded-br-2xl border border-cyan-500/20">At your service. Ask me anything.</p></div>
        </div>
        <div class="p-3">
            <form onsubmit="handleNeuroNova(event)" class="relative flex items-center bg-slate-950 rounded-2xl border border-cyan-500/30">
                <input type="text" id="nn-input" placeholder="Message NeuroNova..." class="w-full bg-transparent border-none text-cyan-400 placeholder-cyan-500/30 outline-none px-4 py-3 font-mono text-sm" autocomplete="off">
                <button type="submit" class="pr-4 text-cyan-500"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <nav class="glass-panel fixed bottom-0 w-full px-6 py-4 flex justify-between items-center z-40 pb-safe">
        <button onclick="switchAppTab('home')" id="nav-home" class="nav-btn nav-active flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-home text-xl"></i><span class="text-[10px] font-bold">Home</span></button>
        <button onclick="switchAppTab('explore')" id="nav-explore" class="nav-btn flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-compass text-xl"></i><span class="text-[10px] font-bold">Explore</span></button>
        <button onclick="switchAppTab('study')" id="nav-study" class="nav-btn flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-book-open text-xl"></i><span class="text-[10px] font-bold">Study</span></button>
        <button onclick="switchAppTab('profile')" id="nav-profile" class="nav-btn flex flex-col items-center gap-1 text-slate-400"><i class="fas fa-user text-xl"></i><span class="text-[10px] font-bold">Profile</span></button>
    </nav>

    <script src="app.js"></script>
    <script>
        if(!localStorage.getItem('beatsvibe_session') || localStorage.getItem('beatsvibe_session') === "null") window.location.replace("index.html");
    </script>
</body>
</html>
